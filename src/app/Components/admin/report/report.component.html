<div class="report-bg p-4">

  <div class="report-card">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">

      <div>

        <h3 class="fw-bold text-success mb-1">
          {{ type | uppercase }} REPORT
        </h3>

        <p class="text-muted mb-0">
          Generate and export detailed reports
        </p>

      </div>

      <div class="mt-3 mt-md-0">

        <button class="btn export-btn pdf-btn me-2"
                (click)="downloadPdf()">

          📄 Export PDF

        </button>

        <button class="btn export-btn excel-btn"
                (click)="downloadExcel()">

          📊 Export Excel

        </button>

      </div>

    </div>

    <!-- FILTERS -->
    <div class="filter-box mb-4"
         *ngIf="type === 'orders'">

      <div class="row g-3">

        <!-- FROM DATE -->
        <div class="col-md-3">

          <label class="form-label fw-semibold">
            From Date
          </label>

          <input type="date"
                 [(ngModel)]="fromDate"
                 class="form-control custom-input">

        </div>

        <!-- TO DATE -->
        <div class="col-md-3">

          <label class="form-label fw-semibold">
            To Date
          </label>

          <input type="date"
                 [(ngModel)]="toDate"
                 class="form-control custom-input">

        </div>

        <!-- CITY -->
        <div class="col-md-3">

          <label class="form-label fw-semibold">
            City
          </label>

          <select [(ngModel)]="city"
                  class="form-select custom-input">

            <option value="">
              All Cities
            </option>

            <option *ngFor="let c of cities"
                    [value]="c">

              {{ c }}

            </option>

          </select>

        </div>

        <!-- BUTTON -->
        <div class="col-md-3 d-flex align-items-end">

          <button class="btn btn-success w-100 search-btn"
                  (click)="loadData()">

            🔍 Search Report

          </button>

        </div>

      </div>

    </div>

    <!-- LOADING -->
    <div *ngIf="loading"
         class="text-center py-5">

      <div class="spinner-border text-success"></div>

      <p class="mt-3 text-muted">
        Loading report...
      </p>

    </div>

    <!-- NO DATA -->
    <div *ngIf="!loading && data.length === 0"
         class="no-data-box">

      <h5 class="text-muted">
        No data found
      </h5>

    </div>

    <!-- TABLE -->
    <div class="table-responsive"
         *ngIf="!loading && data.length > 0">

      <table class="table report-table align-middle">

        <thead>

          <tr>

            <th *ngFor="let col of columns">

              {{ col }}

            </th>

          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let row of data">

            <td *ngFor="let col of columns">

              {{ getValue(row, col) }}

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
