<div class="d-flex justify-content-center align-items-center min-vh-100 enquiry-bg">

  <div class="card enquiry-card shadow-lg border-0">
    <div class="card-body p-4">

      <h3 class="text-center mb-4 fw-bold text-gradient">📩 Enquiry Form</h3>

      <form #enquiryForm="ngForm" (ngSubmit)="save(enquiryForm.value)">

        <div class="mb-3">
          <label class="form-label fw-semibold">Name</label>
          <input type="text" class="form-control input-custom" name="name" ngModel required placeholder="Enter your name">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control input-custom" name="email" ngModel required placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control input-custom" name="password" ngModel placeholder="Enter password">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Contact</label>
          <input type="number" class="form-control input-custom" name="contact" ngModel required placeholder="Enter contact number">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Subject</label>
          <input type="text" class="form-control input-custom" name="subject" ngModel required placeholder="Enter subject">
        </div>

        <button type="submit" class="btn btn-success w-100 rounded-pill submit-btn">
          🚀 Submit Enquiry
        </button>

      </form>

    </div>
  </div>

</div>
