<div class="container-fluid login-bg min-vh-100 d-flex align-items-center justify-content-center">

  <div class="card shadow-lg border-0 p-4 login-card">

    <h3 class="text-center fw-bold mb-4 text-gradient">
      🌿 Farmer Registration
    </h3>

    <form (ngSubmit)="registerFarmer()" #farmerForm="ngForm">

      <div class="mb-3">
        <label class="form-label fw-semibold">Name</label>

        <input type="text"
               class="form-control input-custom"
               [(ngModel)]="farmer.name"
               name="name"
               required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>

        <input type="email"
               class="form-control input-custom"
               [(ngModel)]="farmer.email"
               name="email"
               required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Contact</label>

        <input type="number"
               class="form-control input-custom"
               [(ngModel)]="farmer.contact"
               name="contact"
               required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Address</label>

        <input type="text"
               class="form-control input-custom"
               [(ngModel)]="farmer.address"
               name="address">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>

        <input type="password"
               class="form-control input-custom"
               [(ngModel)]="farmer.password"
               name="password"
               required>
      </div>

      <button class="btn btn-success w-100 fw-bold login-btn"
              [disabled]="!farmerForm.valid">

        Register

      </button>

      <div class="text-center mt-3">

        <span>Already registered?</span>

        <a routerLink="/farmer-login"
           class="fw-bold link-hover ms-1">

          Login here

        </a>

      </div>

    </form>

  </div>

</div>
