<div class="d-flex justify-content-center align-items-center min-vh-100 register-bg">

  <div class="card register-card shadow-lg border-0">
    <div class="card-body p-4">

      <h3 class="text-center mb-4 fw-bold text-gradient">📝 Customer Registration</h3>

      <form (ngSubmit)="registerCustomer()">

        <div class="mb-3">
          <label class="form-label fw-semibold">Name</label>
          <input type="text" class="form-control input-custom" [(ngModel)]="customer.name" name="name" required placeholder="Enter your name">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control input-custom" [(ngModel)]="customer.email" name="email" required placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control input-custom" [(ngModel)]="customer.password" name="password" required placeholder="Enter password">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Contact</label>
          <input type="number" class="form-control input-custom" [(ngModel)]="customer.contact" name="contact" required placeholder="Enter contact number">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Address</label>
          <input type="text" class="form-control input-custom" [(ngModel)]="customer.address" name="address" placeholder="Enter address">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">City</label>
          <input type="text" class="form-control input-custom" [(ngModel)]="customer.city" name="city" placeholder="Enter city">
        </div>

        <button type="submit" class="btn btn-success w-100 rounded-pill register-btn">
          🚀 Register
        </button>

      </form>

      <p *ngIf="error" class="text-danger mt-3 text-center">
        {{ error | json }}
      </p>

      <p class="text-center mt-3 mb-0">
        Already have an account?
        <a routerLink="/login" class="fw-semibold text-success link-hover">Login</a>
      </p>

    </div>
  </div>

</div>
