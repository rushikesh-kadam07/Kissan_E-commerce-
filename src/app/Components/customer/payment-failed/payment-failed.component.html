<div class="container py-5 min-vh-100 d-flex justify-content-center align-items-center bg-light">

  <div class="card shadow-lg border-0 rounded-4 text-center p-4" style="max-width:500px; width:100%;">

    <div *ngIf="loading" class="py-5">
      <div class="spinner-border text-primary"></div>
      <p class="mt-3 text-muted">Checking payment status...</p>
    </div>

    <div *ngIf="!loading">

      <div class="mb-3">
        <div class="display-4 text-danger">✖</div>
      </div>

      <h3 class="text-danger fw-bold mb-2">
        Payment Failed ❌
      </h3>

      <p class="text-muted mb-3">
        {{ errorMessage || 'Something went wrong while processing your payment.' }}
      </p>

      <ul class="list-group list-group-flush text-start mb-4" *ngIf="order">

        <li class="list-group-item d-flex justify-content-between">
          <span>Order ID</span>
          <strong>{{ order.id }}</strong>
        </li>

        <li class="list-group-item d-flex justify-content-between">
          <span>Amount</span>
          <strong>₹{{ order.netAmount | number:'1.2-2' }}</strong>
        </li>

        <li class="list-group-item d-flex justify-content-between">
          <span>Status</span>
          <span class="badge bg-danger">Failed</span>
        </li>

      </ul>

      <div class="d-grid gap-2">

        <button class="btn btn-primary"
                (click)="retryPayment()">
          🔁 Try Again
        </button>

        <a routerLink="/customer/cart"
           class="btn btn-outline-secondary">
          🛒 Back to Cart
        </a>

      </div>

    </div>

  </div>

</div>
